front:
  text: 蓮月禪師語錄序時當春暮綠暗紅稀黃鳥間關午夢初醒忽見西方古佛放光射我此間因歎破山老人深入天童之室故其門下宗匠最多而蓮月禪師洵為得髓之子也蓋今日佛道大盛知識如雲說法如雨行腳者不假遠涉千山萬水保社叢林所在而有豈非幸事但其中不無淆訛大須審細所以古德云打頭不遇作家到底終成骨董此非具擇法眼其不為增上慢人者幾希試觀蓮師語錄斬釘截鐵絕去廉纖所謂獅子哮吼百獸腦裂狐狼野干盡皆倒退三千逼真天童雙桂家法自宜急登剞劂以廣流通則見聞隨喜者將不憚千山萬水參請真正宗師不至瞎卻眾生眼余故不揣無知而敬為之序康熙庚戌檇李約庵道人施博撰蓮月禪師語錄目錄序文二第一卷上堂第二卷上堂第三卷上堂小參第四卷拈古頌古機緣第五卷法語行實偈上第六卷偈下書問像讚佛事附住玉泉語錄二卷目錄終
