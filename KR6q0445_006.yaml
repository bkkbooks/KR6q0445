body:
  text: 侍者性同録偈下示東巖監寺祖風特地振叢林出格施行越古今諸佛到來猶喫棒福昌遞代可傳心送隱石禪人遊峨眉懷香遠上大峨巔借問為山為普賢一一都盧在腳下何須更費草鞋錢示大義禪人桃華夾岸鼓春濤奮翅金鱗意氣豪雷震龍扉誠有力躍然獨步自風高示雲野禪人先賢標格擬何如巖穴雲堂擇所居日用應酬須著眼莫教底事一時疏有山有水即清幽但得身安可暫休莫老煙霞為適意瓶盂何處不風流復東川呂相國經地照程出外江金甌姓字世無雙杖頭雖撥天涯路千里同風化萬邦寄法空禪舊昔年同在夜郎居別後無由寄一書今日湖南更進步較前得力處何如送岫石禪人歸鼎州華嚴草年岐路若為尋一旦相逢話此心只我家風猶未改痛施棒喝喜知音示子鏡禪人機如掣電喝聲高透脫何曾滯一毫七縱八橫全體露冤酬佛祖不相饒春日送博達法姪歸青林開法烏藤雪裏撥春歸觸發深山大澤輝養就嚙人獅子子同看他日出林威贈青林西堂秋水姪孫法幢重建勿辭勞表帥人天賴爾曹鼓笛頻頻還共打青林一曲和來高贈青林監院幻影姪孫擔荷叢林一段才還如風動百華開蛟龍變化承斯力吐霧吞雲響巨雷示潤宇相居士空山野水緑蘿深散暑乘風偶一臨若也更忘喧與寂復何煩熱礙幽襟號大用禪人大機大用大威光吐氣翻身貴自強畢竟當仁師不讓從教虎驟與龍驤示岐岡嚴居士應無所住而生心此意愈研愈覺深試就當機聊舉似前江虛映月高臨示天瑩禪人或時川北或川南到處風光何二三但得回頭看腳下一輪明月映秋潭寄附麟牛文學文章山水蜀乾坤無數字隨三峽奔只喜金鱗桃浪暖雲雷相送過龍門示凌雲大德禮萬佛名萬億如來心印心同名異號礦銷金一稱一禮常精進只要自他契悟深示九龍松巖監寺種田博飯足家常為己忙乎為衆忙大小住持皆一體莫言辛苦枉承當示潤吾張居士金剛般若與壇經故紙多年卻最靈兩卷較來何所似白鵝恰好換黃庭示清寰楊居士有士唐時姓著龐悟從一口吸西江楊公勘破此中意可作塵勞箇法幢示惺蘇禪人底事分明腳下通古人祝指路頭同上堂諸佛問何處答在闍黎鼻孔中示雲竹監院選佛場開萬木霜根深葉茂占春光高風一轉東皇令華果成時遍界香示恆愚禪人得不得兮問恁麼恁麼的事轉淆訛腳跟直截與三十踏破關山唱哩囉訪本源上座春初策杖翠微巔古木深幽盡帶煙高隱故人無俗客唯餘華鳥共談禪夏日與友人坐話盡日茗爐坐福昌每從南北話行藏大都荊楚荷華勝引得清風宇宙香示修源水頭三年祕行佩師旨汲取曹源一滴水桶底脫時眼大開通身踴躍笑而已號雪林禪人策杖歸來山較深卻隨雲水復相尋示人端的不將境如玉如珠雪一林示徵明監寺此選佛場龍象繁凜然大坐正當軒心空方許同登第誰作今科佛狀元示貫如侍者喚既有三應亦三負吾負汝復何談就中識取國師舌有路可行更指南雪夜同衆圍爐火爐頭憶普通年立雪齊腰續正傳傳到廣嗣薪不盡烈烈轟轟卻勝先寄印月禪人故人瓢笠上荊南憶舊音書客裏探家舍途中隔幾許寄來公案可同參寄炳然禪人山中相別三年餘法愛何曾一日疏那得殷勤師弟誼未歸索偈與君書寄堅一禪人水雲一鉢客心孤行者自行居者居彼此相看仍舊面無煩特地問何如示堅密碓頭庚嶺趁來氣不平不思善惡眼方明終輸踏碓人多力衣鉢拈提石上輕寄敬白上座溪山三載幸相鄰清苦家風已大振省覲吾師曾有語闍黎舉似我般人示綦江董居士偶然策杖過街頭笑得維摩話去留顧我漫勞打口鼓江聲千古詠悠悠重逢熊文學煙水溪邊一晤來溪聲猶帶雨聲催而今暫引木樨話露冷風清華正開示養白余居士一句話頭日用中凝然不復辨西東千般伎倆渾閒事唯有真疑契己躬遊臥龍山天池何年闢此最高峰留得天池養臥龍洗鉢老僧彈一指興雲吐霧出深宮號大可禪人飛出林中箇鳳皇風高雲靜喜當陽直須奮起沖霄力大可鳴時聲自長初夏坐鍾應山房殿角微涼古木深熏風拂拂欲披襟坐中若遇知音客且聽黃鸝轉緑陰看楞伽峰玉柱玲瓏怪石山之巔霜雪堆頭器骨堅想是劫灰重鍛煉撐天拄地到驢年蓋山除夕示衆分歲曾烹露地牛山僧今日不同謀破沙盆底無餘物唯有鎮州蘿蔔頭示前溪羅居士喝聲不絶似雷奔喝得當機威始尊覿面喝開正法眼明明歷歷破沙盆示弘祚張居士覷破浮漚事事空回頭急看主人公有時露出渠儂面華發溪山緣與紅贈東巖宗公重修福昌福昌名勝溯諸唐宗伯劉碑紀甚詳今幸東巖公整理祖燈從此又重光示發仁樊居士佛說直心是道場臨機直處許誰藏未曾開口攔腮掌打得本來面放光送現禪人還蜀船陸往還不憚勞從教青嶂插天高腳跟下痛與三十踏上塗峰興轉豪示元體陳居士生與不生生義符分明一義沒殊途當生勘破不生處心眼大開照五湖示發肖何居士從來佛法沒人情特地震威喝一聲生死路頭都喝斷與君直捷說無生福昌懷古二首福昌祖席四傳燈名著當年海內稱斷碣文章猶未泯山靈有意待重興善師說法不周遮本色為人推作家據座如臨千衆勢高風萬古播天涯示雲池岷源上座一江水繞一池雲江與池從沙岸分養就金鱗堪變化風雷大震入龍群復徵覺二禪人本來面目既同參莫把疑情更二三此話果然端的透無多言說向人談問生禪人乞衣索偈多年行腳一朽材尋山半是臥莓苔荷衣擬欲連雲補信手誰拈幾片來示徵明禪人尋常舊水變蛟龍頭角崢嶸上九重一滴誠能澍大雨不施心力有雲從寄友人居山松風水月足良朋心與山忘也未曾到處青山皆有趣亦將消息寄山僧示渚宮衆居士只在尋常日用間低頭疑慮隔千山但能直入自平貼信步行超生死關心才舉即起塵勞聲色何如更欲逃覿面不為物所轉空王佛便是同曹暮春與毒鼓禪師坐來蘇峰大蘇勝蹟寄巖前留得虛名千古傳欲覽遺文尋石窟池臺長詠雨華天東坡何事縱閒遊一片高風拂古丘錦繡文章雲五色卷舒不定自悠悠煙雲絶頂暮春寒幾度同行倚石欄只恐雨華飛盡後東坡夫子舊碑殘偶然雲水兩相逢到處安居立上風煙雨層巒剛半日尋常談笑達磨宗虎丘禮隆祖塔瞌睡虎高坐虎丘威獰赫奕萬年留兒孫出穴爪牙露秖為生來氣食牛雙桂室中留別有感為衆同參述此剪燭焚香話夙根吾師隱顯孰同尊忽然舉到感傷處不覺離顏帶淚痕哭親故宅不迷長樹根悽愴木本未曾敦歸來豈為空追遠欲效那吒乃報恩高堂小閣盡塵埃血骨未藏火未灰今日安身非別處滿園華卉是蓮臺過東白道人石影亭緑蘿洞口一泓澄亭挂巖邊最上層水石玲瓏山欲動虛舟試問幾來登示松雲禪人問君近日住何山到處雲生竹石間對境無心忘彼此林泉城市自幽閒宿杏雨齊欹枕高眠杏雨齊滿床風月動詩懷卷簾便得無心句竹影翩翩掃玉階春日訪友夜坐桃華溪徑入雲窩煮茗敲詩興轉多無限客心話欲盡一床明月臥煙蘿冠山寄渝州端甫苟居士巴江暫寫九回腸惱殺水雲杖底忙三宿他山閒夢斷只多風雨憶連床過虛上人房和涪陵梁太守韻短榻疏窗近水天江風一枕任高眠莓苔復照初晴月華竹還留雨後煙水滿前江月滿天懸嵒石佛對僧眠惺來何處牽幽興洗墨池生一樹煙示雨溪周居士二首父母未生前本來何面目三春放碧桃九月開黃菊父母未生前本來何面目雲山幾點青煙水一溪淥示心所游居士二首自遠來求字其如一字無有無都勘破東壁挂葫蘆未根棒喝旨筆墨秖貪多文字能相委拈華笑甚麼果州青居山重晤無虞友人二首一別七年也重逢何幸焉悲歡無限意松韻自悠然瓢笠風塵隔今方話此山莫愁歸去晚暫學白雲閒凌雲夜雨二首小閣孤松下夜來疏雨灑秋聲共我吟客思對誰寫小閣孤松下松枝帶露灑旅愁日益濃即景如何寫懷白堂初夏時序臨炎帝尋詩過草亭芭蕉依案緑楊柳臥窗青機活嬌鶯舌身輕乳燕翎目前景物煥拈出令人惺晝長餘獨坐萬籟靜中聽蜂韻集疏蕊蛙聲鬥細萍雨蒸梅欲熟風扇芰微馨擔怕忘人世悠然對石屏中秋送別內翰孟章龔居士辭朝入洞天夜話故鄉田共聽松聲細笑看桂影圓邸中知己矣林下有人焉不負雙峰約何時書再傳南浦都歷山留別西衢法弟共憶別來久今才話舊遊盛山騰鐵鳳峽水飽金牛他日望猶重當年志已酬江南雖我去何似此清幽送岑壁法姪歸大峨我自三峽出君從兩浙歸南溟珠滿鉢西嶺瑞生衣灩澦濤初靜峨眉月正輝荊南送別去大震象王威示沖斗羅居士長者來相訪回光尚未遲俊哉撥便轉白也涅何緇皓月清池現蓮華濁水宜坐忘時看取善惡兩無思冬日與罕拙老宿坐話幾度辨雲日閒探前哲蹤芭蕉拄杖少灃浦剎竿重市近既無竹臺荒舊有松雪深遲歲晚瓢笠約春風示引月禪人頂門開正眼皎月自孤圓已識影多幻漫隨第二遷松邀出嶺上華引到池邊萬里長空靜清輝滿一天贈明覺禪人少年圖作佛此志貴乎堅乳虎威偏猛蟄龍力易全如斯勤自策畢竟越人前縱祖燈秋晚紹隆爾勉旃良晤以言贈英才量必過志高心淡遠養厚氣巍峨曙色嶺頭啓秋聲竹裏多不隨前境轉著眼意如何果城東村凌雲山房初夏青山縱目遠赤帝震威初樹影籠巖岫雲光動石渠間松虛閣小近竹舊窗疏荒圃乍耘種筍芹香滿廚時節悠然換溪山別一村燭天輪已赫蒸物氣猶溫放浪野人志淒清古帝魂緑陰客不到掃石枕松根去國頻寒暑今餘此地歸石泉涵座冷煙火隔村稀澗曲流青黛巖深映赤暉幾枝梅子熟帶露折來肥風自南來也時哉衆鳥呼陰晴雲日變雨露物華殊鼓浪麥初熟鬱香榴已敷眼前一種趣忍不詠詩乎品物催新暑閒吟意若何已知長日暇尚惜晚春過燕語穿朱檻鶯聲挂緑蘿炎涼雖變態旦夕覺風和避暑來東里瀟然遠四鄰猶從當日俗唯少舊居人草澤蟲聲亂溪橋月色新荷風涼夜永益友坐談親山前舒野望風日動吟情過嶺啼鳩捷泛波乳鴨輕光搖新芰嫋韻瀉古苔清帝力抑何有老農復漸耕就題聯句苦對景入詩魔拂跡龜分藻振鬚魚弄荷晴光開雨笠野色上雲蓑幾欲忘情思其如有興何故人不可問借問亦云無古寺遺唐宋斷橋勒史胡暑來華影瘦春去鳥聲粗松竹多涼蔭水雲恰與符少年就外傳韓氏尚書家人物全非舊鄉談半是差巢秧鳴水鳥喧野詠榴華散步幽林下風高襟袖斜登來蘇峰煙霄天地別風土廣蓬均竹韻華間軟山容雨後新書藏石穴祕劍劈玉池津碑古還重讀東坡跡更真塗山禹廟張公蒞是邑大禹首稱尊不病波濤險深懷疏鑿恩塗山昭母姓字水篆龍門廟貌遵卑室清風萬古存遵義俞邑候春日過訪賦贈忙閒渾不問覽勝到巖阿水白宦情冷華紅詩興多林栖支遁鶴池舞右軍鵝就石從高枕風光見永和春山稍寓目愁慮頓銷磨日正華容麗風清鳥語和詩吟緑竹案酒醉白雲窩莫是陶彭澤又從蓮社過送靈隱法弟歸楚高梁重送別萬里百華敷水脈分三峽風光動五湖開帆群鶴舞擲餌衆龍趨把臂復何處杖藜策越吳寄昌言許居士重晤復重別別來年復三祀親歸蜀北罵佛出荊南經史歡翁博水雲笑我貪蒲團如可放清苦擬同甘過巖峰山房贈恆一主人偶到雨華齊雨華積滿階有人拈熟稻無樹折生柴恬憺偏高致疏慵卻稱懷喜君知我意不事強安排雨後訪興福三同上座山聲何處來木葉頻頻打竹密怒驚濤檐高飛急瀉濃雲滿榻生寒玉半窗灑今日客愁消幸逢知己者贈不語禪人煙村香閣上野望自留人雨急江聲亂雲開樹色新小橋攀二柳巨浪躍雙鱗卓錫依形勝幽栖龍虎馴巴山雪夜寒風何處起清夜度渝江折竹聲來枕壓松色上窗推敲詩有興唱和曲無雙啓戶山童報天華散法幢贈本然禪師復保壽重開名勝蹟蜀北更無雙草闢縱橫徑燈明新舊窗倦來驚暮鼓興至俯秋江莫道規模大還應建法幢黃金重布地祗樹影雙雙霞過紅生幔月臨白上窗涼風清梵閣靈籟瀉前江一國稱高行清名勒石幢登雲臺贈松雲素水二禪人昔年歸故國無著與天親共復古名勝樓臺一旦新風高同市井念靜別囂塵莫厭境喧寂超然自在身天南辭草榻蜀北掃雲臺丞相標明諡使君賦越才抱巖山色曲繞座水聲回歸去語人曰登臨亦壯哉住野春山石屏寺亂峰曲徑入祇林長者年來重布金池滿共看邀月早臺高自許臥雲深野華暗刺時人眼幽鳥細談古佛心怪石當機從𨁝跳點頭箇箇盡知音示白雲雪穎禪人避秦偶到白雲間又進雲深山外山數樹雨風搖客思一天晴日破愁顏烽煙戍火從他鬧峻壑幽巖任我閒差別路頭俱坐斷無人過得摩訶關示瑞峰新戒三千八萬漫分科持犯繇來不較多幾縷垢衣書七佛半肩壞色攝群魔酒臺醒眼醉神廟獵網藏身飽肉鍋沒量大人行徑別返常合道益淆訛贈健翁張護法雪中修法堂香剎增修心志足規模大闢遺芳躅買園依地布黃金砌石滿臺鋪白玉誠重惟歡供佛新勞輕不厭鳩工促高敷猊座吼人天觸著爪牙皆中毒與本源禪人山行賞雪匪從人力匪天工寒入梅華瑞氣濃古木枝枝銀作幹青山箇箇玉為容易侵頭上眉兼髮莫辨巖邊竹與松大地遙看皆一色翻然踏破露真蹤寓金鳳山和己禪人韻金鳳山中金鳳巢棲巢金鳳養金毛翼齊初翥雲生彩風疾旋搏竹怒濤慣飲天池品自貴直翀霄漢氣何豪乾坤鍾有文明運靈瑞相將出聖朝懷破山老和尚撥草瞻風入楚西行藏未定復追隨馬駒並轡力重買獅子同聲威大施鐘擊轅門三峽動血流棧道數書馳爐邊何日團圞話稍慰關山寤寐思位旃林護法過訪次韻巖居散誕絶安危飲客茶鐺就石支容易淵明於我友等間慧遠卻誰師泉聲迭出松間緩日影斜穿竹裏遲盡興徘徊忘去住何殊三笑度溪時浪跡疏狂物外人巖亭寥廓任安身石幢濺玉非關雨苔徑鋪華不是塵雲出洞前拖一片月依嶺外起孤輪江千留別行還止兩岸清風動緑蘋江陵旅中除夕警衆風野寒溫一歲除年光新舊意何如梅經雪逼華先放柳怯霜嚴葉未舒道業可成奚待緩人情不熟且教疏了明三十日來事慶快兒童嬉笑餘冬日雪晴訪友雪榻霜龕覓火頻紅輪初照已如春冰開緑沼歡魚性風暖青霄稱鶴身柳線斜垂疏亦媚梅華獨露淡偏新一聯得意客愁解欲過長堤訪故人南浦撥霞洞遣夏三首碧巖千尺瀉飛泉一徑盤回上洞天白足高低踏怪石烏藤旦夕撥孤煙松青溪上聯三友玉灑風中奏七絃楓灶蘿龕人世遠瓊華敷座任安禪水晶宮殿鎖瓊扉浩劫空壇古木肥繞榻香清蘭霧起濺衣雨細瀑華飛苔深文繡石枰老谷冷聲傳玉磬微犬吠白雲鶴唳月蓬萊仙子可知歸石穴泠泠細液流仙人華下問源頭煙霞五色襯瑤草風雨二聲戰玉樓錫振巖阿驚虎嘯鉢懸洞口待龍遊琴臺夜坐天光淡簾卷溪山月挂鉤復無欲熊居士來韻草閣新開碧岫前層層岫色接青天撫松度澗多琴韻攀竹過巖兩袖煙紫闕歸來慵獻賦白雲高臥喜逃禪幽懷既有藤蘿約一洗乾坤石上泉復燦錦程居士來韻行行偶到薜蘿庵十里溪橋湘水南豈止優婆塞四衆人非人等許同參石藏華圃和雲買泉給茶鐺帶月擔何日與君重一晤焚香揮麈話煙嵐與公井高孝廉山行坐桃華洞幽鳥啼華語未闌莓苔曲徑接天關石門深鎖藤蘿內玉液斜流詩字間行撥彩霞不問止坐邀明月卻忘還相逢未肯遲車馬唯有先生伴我閒復福昌護法幻幻黃居士來韻獅床豎拂現威儀詢信端同繼善師昔煜五燈無盡焰今垂雙桂不凋枝帝王勝蹟凌諸剎龍象高蹤聚九逵重詠先生先作賦才情不讓毋潛詩初春過雲浦老宿別業蘿龕東近仲宣樓一圃攤書色相幽怪石竅中冰尚在奇華枝上葉新抽竹光晴雨老僧識墨跡淡濃太史留几席煙霞饒野趣愧無佳句共君酬與溢天上座遊灩澦水際未知幾許深狀如象馬不浮沉色隨雲日奪人目影漾風濤豁我襟為砥衆流橫峽口欲超群峭湧江心奇觀莫漫徒相負聊擬當年杜甫吟巫峽與衆禪人夜泛水光月色杳冥時泛泛輕舟任所之一出深雲兩岸闢重回急浪數峰移灘吞泉石響多亂巖挂星辰影互隨夜半不知何處宿蛟龍共起復嫌遲九青山房遣懷佯狂笑傲孰稱豪莫大青山縱我曹拈韻五溪鳴石籟寫懷萬壑舞松濤雲鋪藥嶺牛眠暖月過華村犬吠高獨有庭前行樂處鋤煙種竹自勤勞屋角煙雲接樹梢芹泥飛燕挂新巢紅華亂落堪為褥青蔓斜牽勝葺茅松韻狂時四壁起桂輪明處六窗交深山萬籟皆吟詠古調現成不用敲夜郎山寄素懷禪友破衲枯藤住薜蘿風回萬彙氣初和猿聲出嶺顛狂甚鳥語喧窗賣弄多瘦竹風前吟細葉老梅雪裏放新柯寒暄幾度年華改泉石身心只恁麼巴渝白巖寄君維余護法偶來此處便為家自笑逃禪學聚沙圃小還宜疏種竹臺高尚欲早移華撥雲鳥共尋嵒路弄月鹿同到水涯瀟灑不知塵世事緑蘿白石枕紅霞雪峨張護法邀遊黃鶴樓覽勝共憑黃鶴樓樓空鶴去跡還留杖尋芳草六年撥笛奏落梅二月遊老樹參天標異棗古城夾岸蕩虛舟煙嵐尚與人間接身世直疑在斗牛書上雙桂破山老和尚自省覲後欲依字水偷閒於初春時已入塗山守拙豈知慈訓遙頒召歸繼席焚香捧讀喜懼兼生若論雙桂代勞猶思退後樗櫟朽材難勝法門巨任惟上天童掃塔正欲向前淵源嫡派各懷達孝深思禹廟嵒邊拂袖欲等風馳龍門灝裏張帆思同電激但諸護法相延尚待辭謝攜幾禪和共往秖爭勇行滿擬夏末即趨座前專候江南動止消息本院住持體裁皆盡心力恪遵典型肅此先復仰希鑒原達聖瑞姚護法先師道行蜀中惟高梁緣最熟知有夙因但他人在治世護持猶覺稍易大護法在亂世護持更覺為難況建大叢林豎大法幢名標不朽伊誰之力歟迄今圓寂凡事所係尤重晏石禪師來敘大護法委屈衆中秖勸安和如此心行可格佛祖龍天緬惟先師前後語録原欲下江南刻成全集此生前諄諄之遺命祈大護法注意與衆執事酌議力為主持蚤圓者則公案豈一人感荷即先師神明中深為之感荷天下萬世人共為之感荷也臨穎翹企不勝待命之至像讚出山相肩褊袒腰繫裙半帶雪半帶雲鬚髮蒼古氣象不群走到人間難晦跡郎當號作釋迦文布袋街頭遊戲滿腔樂趣慣引兒童雜譁迥超佛祖常度等箇人人不遇布袋打開誰解顧微微冷笑笑中刀覿面鋒鋩太煞露白衣大士本無形段素以為絢塵剎分身彈指皆遍跏趺怪石巖前遊戲碧波水面繞座繞幢淡雲幾片無字無文殘經半卷如有問動靜兩忘向什麼處與伊相見只對他道亦不思惡亦不思善達磨一葦渡江九年面壁人覓安心卻令自覓覓之不得求端的無孔鐵鎚便痛擊骨髓當頭拶出來至今授受傳為嫡破山老和尚或動或止或瞋或喜明辨龍蛇暗擒虎兕杲日中天不倚迅雷驀地轟起抑揚大有全威縱奪初無定旨無定旨難比擬火官頭上風車子又檇李開華蠶叢結果四海英豪咸承印可咦相逢痛棒無情機下電光石火淨明耆宿年臘俱尊心神並王面上恬愈胸中快暢鐵佛道場復之如創兒孫相承請讚供養呵呵非徒空事形儀欲效逼真志向佛事挂板師云有聲非動無聲非靜動靜不生拍拍是令乃擊一下云諦聽諦聽上天童掃密雲師翁塔憶昔提持濟北宗全身獨露劍揮空兒孫大振當年範龍象常瞻在世風松籟入雲重唱和巖光射日最玲瓏層巒曲水甲天下源遠流長道脈隆為湛泉禪人下火師舉起火炬云來是恁麼來去亦恁麼去攛下云來去既無殊同歸大火聚咄若向者裏開隻眼盡大地乾坤總是汝放身命處為若夢侍僧下火擔囊負鉢勤參苦學打不歇手罵不歇口十載追隨一朝別離臨行主張渾不著忙去來與麼鼓掌呵呵以火炬攛下云老僧特地助一把火燒得汝赤灑灑淨裸裸東土西天無可不可南浦首四談護法遷巴渝卒於渝之康村師至靈前挽曰濟北宗風末世彰千鈞才力屬金湯讀經依案諸根靜請佛拈華一語香太白巖前聞道久古巴城外轉身忙法門此後何人護感慨忍禁淚兩行達吾宋居士葬父於凌雲山側請師說法師至柩前垂語云昔時未面今卻相送秋色淒清悲風遠動布德有年頌德彌衆生死二途來去如夢棒頭指歸直下知痛乃以拄杖畫一圓相喝一喝復卓拄杖云堆頭添土證據宋公者裏安身多種受用為獻珩耆宿下火渝州與荊州兩地莫能留身世回頭看儼然一海漚以火炬攛下喝一喝云優游物外乾坤廓無位真人六不收原藉山西今寓蜀東重慶府巴縣事佛弟子牛秉儒男牛附麒牛附麟捐資刻第五第六卷玉泉道人張國賢識
