body:
  text: 侍者發悟録法語示覺非禪人欲究行腳中事先將從前習氣憎愛境緣屏除殆盡只打理一箇空空蕩蕩身心入於稠人廣衆之中卓然自立或遭人罵或遭人打逆順甘苦皆欲備嘗一朝踢翻漆桶庶幾堪與龍象蹴踏也示貴筑悟禪人若論此事不向外求只因境緣牽引迷失無位真人不見本來面目遂為生死流轉忽然回光返照急欲推尋如失了極重物畢竟要親見親得然後放下直逼拶到水窮山盡處驀地相逢咄元來在者裏示月溪禪人八萬四千功德中唯般若力最勝最堅最利能割裂世間愛網能截斷生死根株但恐不入紅爐遂成頑鈍若向辣手邊久經鍛煉滑石上重加磨礱露出鋒鋩豈肯稍涉一毫之𦆆纖耶示字浪禪人派遠流長佛法原無古今世異事殊人心亦有隆替所賴苦志衲子辨箇鐵石身心不隨人起倒或行腳或住山全身擔荷此事必要做到出頭處去縱處荊棘劍鋒亦不惜性命也勉之示松巖禪人松巖禪人出俗年幼浪跡夜郎夙因奇遘甘苦衆中進前退後先聖宗乘未曾專究空過青春徒消白晝寒暑迭遷齒缺面皺臥病巴山莫能自救感慨欷歔罪向誰首今日重逢眼目如舊何似回光追尋反覆將者關頭猛然看透散淡無拘放身宇宙佛可與伊罔欲人授抑且不孤在吾左右信筆書來一場漏逗讀之再三全非虛謬閒打葛藤聊成一幅示雲在禪人學道之人不可依稀混過日子卒無濟於己事直須平貼一片心地好惡長短是非毀譽都盧拋向汪洋大海動靜忙閒常在此中著腳無上妙道自然開發遇境逢緣皆是佛祖出身處也勉旃示五雲彭居士佛法無他只貴鼻孔端正然不可求之高遠奇妙唯在日用尋常間善用其心耳古人云此是選佛場心空及第歸若空得去佛也不欲做菩提煩惱如紅爐上一點雪豈有欣厭取捨交攻於中哉示長輔費居士不二法門非語言可入亦非空寂可攀務要識得趨向路頭始不逡巡於外然而路頭不在別處即於腳下荊棘石頭邊不可蹉過一朝踏破草鞋盡大地是箇毗耶城也示健翁張居士健翁張護法晚年事佛修柏子堂已成保社乃延山僧居焉一日入影堂禮雙桂老和尚像有感有悟豫云若見自己本來面目即見者老和尚面目即見從上佛祖而目便是他家兒孫也即於此日取法名曰印直以直心是道場故別號健翁護持法門振大勢力精勤學道魔外不侵早成佛道皆佛祖健兒也復贈一偈靈山有約到今來一遇同儕兩眼開滿地兒孫生佛口直教佛口又懷胎示大徹禪人出家學道不是隨人起倒今日三明日四耽閣一生直須奮大志看從上佛祖標格畢竟要知他眉毛長短鼻孔淺深頂門眼開自己又缺少箇甚麼手疾眼快時就要奪猛虎口中食驪龍頷下珠亦不為分外也勉之示明旨禪人既作佛祖兒孫須行佛祖事業能行佛祖事業方稱佛祖兒孫持戒聽教參禪總為明自己一件大事大事既明百千法門一一皆明行住坐臥無非清淨道場更不見有生死可疑只是痛快一生勉之示其任禪人乳虎有食牛之氣太鵬有吞海之勢此據本來根性有如是猛利有如是軒昂若待爪牙備羽翼齊自然驚群動衆威勢如王豈尋常種類所敢望其項背者哉勉之勉之示臥雲禪人學道不可性急即勉強求悟要人許可言句自以為諦當恐終無濟於事又不可性緩今年也如是明年也如是央庠度日全無血性恐驢年也未夢見在須向有疑處著力不可移換亦不問我此生悟不悟只看我每日疑不疑如此用心便是步步踏實地一出頭來自是與人不同所謂會徹源頭一點清者是也示希有禪人佛法本現成不會時不曾少會時亦不曾多若能善用心必不學禪客樣必不說套頭語恐不能瞞人只瞞得自己臨濟三年不知問話一日出身是何作用雖然如是平素斷不可坐在無事甲裏畢竟有一莫大的事蘊在胸中不肯輕輕放過直須勘破佛祖舌頭透頂透底略無疑滯方是汝放下時也勉之示允則禪人做出格人行出格事要負一段英鋭意氣孜孜切切以悟為期大凡不倒斷處即一番好下手處任是銀山鐵壁盡力拶將去一旦冰消瓦解自然不疑生不疑死不疑佛不疑祖是時可稱慶快平生示無我禪人法門趨向沒殊途腳下騰騰勿少迂遲速同歸非巧拙直教萬里一條鐵籌蹰顧盻路頭岐岐路忘羊咎阿誰祝指玄沙不度嶺髑髏磕破剎那頃毋徒杓卜聽虛聲我說寧如卿自行撞到深山師子窟成群作隊爪牙發忽然哮吼勢稱尊特地驚聞異類奔若是丈夫皮有血何妨景仰繼前哲舊來題目亦多般覷捕真人赤肉團今日恁麼相委悉他時應笑太無端示大操禪人鷲嶺拈華勘悟迷明明歷歷痛提撕尚餘種草遺東震根器漸分略未齊大樹一株千古盛縱臨秋晚骨猶徑撐天拄地傲風霜枝葉欣榮長掩映去聖既遙慧命微男兒幾箇解當機魔宮虎穴皆親入豈向傍人問是非若著手心頭便判莫教疑與信相半進前退後步遲遲畢竟何時得倒斷驀直行來路更便到家博飯故鄉田吾今激切無他意不負己靈爾勉旃示當臺禪人結佛祖冤家須立大志起大疑志若勇鋭愈退愈進疑既堅凝轉入轉深胸次中隱隱躍躍自有不容己之勢從此切之又切猛上加猛逼到情窮理極時忽然漆桶子快眼光爍破四天下正好喫東印痛棒也示心一禪人靜悄悄處得力鬧浩浩處亦可橫身若是厭喧求寂久則墮於無事之鄉古德喚作急流水又喚作黑暗深坑良可畏也且如何得恰好去功德天黑暗女有智主人二俱不取山僧病筆露布如是異日若守此見一棒打折驢腰莫言不道示瑩白座主將有別才詩有別長教有別傳然而別傳之事亦不從人得須向各人己躬下默默體取將從前淆訛言句無義路鐵塊子看教七穿八穴又要逢人決擇活其機大其用然後向山間林下保養聖胎只待霜露果熟方堪與佛祖出氣也示涵輝禪人脫卻世間網作大丈夫事要辦鐵石肝腸方學得古人行履如腰石舂米立雪斷臂坐破蒲團典卻布單投火聚之中混兵隊之內皆是生死二字看得甚切以致誠重勞輕故不知有身命耳然而初地時立定一箇巴鼻猛力做去自不覺冷灰裏有粒豆燦也示璞隱禪人住山一事蓋謂生死不明見諦不徹務要工夫得力冠樺衣麻澗飲木食皆隨緣分唯握柄钁頭東掘西掘只須覓取大休大歇之處然後放身捨命璞隱禪人鳩友縛茅亦欲效古乞余數言勵志異日相逢但問山中事何如道得道不得都盧痛與三十示蓬贏楊居士山野素志深栖巖穴佛法兩字未曾啓口因居士客歲過訪微微露箇消息豈知不解蓋覆引得一夥人做計做較箇箇欲學白拈賊秖要偷過生死關頭今復歸來也有些子伎倆去去來來亦在窺算只未敢大膽嘻切莫偷我破沙盆誠恐一時和贓捉敗示雲所曾居士佛有一代時教祖有千百則公案皆在荊棘林中下腳忽然走出頭來正好就路還家如金剛般若所明應無所住而生其心當時有箇賣柴漢聞此一句豁然契悟居士終日持誦安可草草放過須把者著子向未開卷前勘得破始不被語言文字瞞且道無所住處如何生心聻鯨吞海水盡露出珊瑚枝示祥宇田居士在家學道根器較大只不可於染淨諸緣上自生分別六祖大師云淤泥定主生紅蓮豈不昭著古今恁麼信得及搆得上自見本體有一段大威光大受用但不可自輕自忽閒時忙時逢緣理會遇境生疑一朝露出頂門正眼自不覺築著磕著皆是佛法也示覺源柯居士念佛參禪以了生死為極則殊途一致也蓋念佛即看念的是什麼佛參禪即看參的是什麼人看來看去眼光露出自不向外更覓別佛始信古人道日用事無別唯吾自偶諧試問居士作麼生是無別的道理若道得一句分明許伊與龐公同一鼻孔出氣示本源禪人木有本水有源是以發生流行變化無窮永嘉大師云直截根源佛所印摘葉尋枝我不能當知拈匙放筯擇火焚香一動一靜皆要推其本溯其源也且極則處如何理會畢竟水須朝海去到頭雲定覓山歸示弘旨何居士心外無法法外無心水鳥樹林盡解說法牆壁瓦礫悉皆放光只要當陽勘破方得者般境界現前亦不是別有一法可加於我無非從此心流出一一現成然而此心不在內不在外不在中間當在何處若撥得轉者箇關頭便知維摩老漢一默中消息示古心禪人諸佛衆生皆同此心只爭迷與悟而已若要究明此心當於行住坐臥處穿衣喫飯時一一體認畢竟要見箇落處恁麼逼拶將去只教不疑自疑日久月深工夫自然成片一朝打失眼睛方見得我與諸佛同一面孔同一受用是時求迷悟生死了不可得示春巖禪人此事的要過量人方能操到徹頭處去然而日常用心只不可坐在無疑之地但有一毫礙塞畢竟不肯放過自然日益日損透頂透底諦觀先聖是何標格斷不可淺淺自待凡是閒門破戶必須一一踐履直入從上老古錐深深閫奧方是放身命處也勉之示雨谷水頭六度萬行非徒事勤苦將以助發般若之力也儻能善用其心只在古人言句上奮然疑將去閒時忙時總是一箇疑情不可一念暫生起滅忽然桶底脫時方知從前無可奈何處是我得力處高峰大師云泥多佛大水漲船高旨哉言乎示秀峰禪人祖燈秋晚慧命如絲叢林紀綱罕能大振縱有來學不遇本色鉗鎚卒未有成良器者若是不群之士先具箇行腳眼識人好惡拈下笠子解卻腰包決定要見性命落處楊岐栗棘蓬金剛圈或可吞跳也示雲嵩禪人學佛法人如一箇鐵橛子相似直是搖撼不動逆順毀譽不二其心得失是非不變其志縱處於千萬人中不見一人唯有一點疑情念茲在茲忽然勘破佛祖肝膽可以頓超凡聖貫徹古今是時正好踏破草鞋歸家穩坐示普濟禪人立雪斷臂腰石負舂歷盡艱辛方堪誘接後昆紹隆先聖豈輕忽所可致哉況今保社零落必抱遠大之志久為操履深得一番痛快逼到那羅籠不肯住呼喚不回頭時若遇一機一境卓卓有箇出身之路方是不受惑的人也勉旃勉旃示永嵩禪人治世語言資生業等皆與實相不相違背如此看來則佛法世法豈有兩般風柯月渚深談不二法門鵲噪鴉鳴皆露拈華妙義滿眼滿耳總是一箇大光明藏任運騰騰騰騰任運便是大解脫人也示明生禪人此事不論根器利鈍只以勇猛為先不顧危亡單刀直入彈指收功豈可於影響邊進前退後較量悟與不悟哉示占拙禪人食麻麥栖巖穴萬年一念一念萬年決不被物轉不隨境移若身若心晝三夜三亦復不容片刻偷安方能了辦大事趙州云老僧除粥飯二時二十年不雜用心夫豈徒然哉示大用禪人柏子老漢住在地肺之上許多人蹉過不知地肺何在卻向外邊掘取覓取不知轉掘轉深轉覓轉遠老漢今日露箇肺腑之言但肯回頭看透自己肺肝便見天之肺肝地之肺肝佛之肺肝祖之肺肝天下古今人之肺肝與自己之肺肝無一絲毫隔越只是洞徹明了更不疑問別人也為甚如此天地與我同根萬物與我一體示修學典座修學典座在廣嗣供衆一期志願勤苦不下古人但未盡識古人行徑如雪峰在德山溈山在百丈皆有超群之作若識得二古人機用豈止同一行門即同一鼻孔也示慈慧典座謀一身之計不足成功守一己之愚不能發悟若於廣衆中辦箇心力日用裏著隻眼睛既任叢林之勞復提性命之事始不孤負一生昔文喜在廚中精誠供衆一日文殊於粥鍋中現身文喜打曰文殊自文殊文喜自文喜且道他是什麼心行若猶不會看取上頭注腳行實康熙癸卯溢天恆靖松巖等同詣室中請說行實師曰余之醜態昔年有人借問以不足為後昆法未敢舉似人且忘失亦多只好略述大既余蜀北果州嶽池人也父姜氏母楊氏因母早背哀哀無聊請僧轉經用資冥福側聽三界無安猶如火宅不覺悚然乃自讀全經遂有出塵之念後聞六祖惟圖作佛之語益增勇鋭一日白父父不之許自以刀斷髮遍訪本郡諸山老衲卒無契合者乃出渝州遇淨宇法師講楞嚴諸經復上赤城青蓮高原大師處聽講唯識等論亦覺種種道理引發夙因及至遇萬峰禪客尋常出言莫能酬對乃奮志學禪欲上萬峰先遇象崖和尚遂請益崖曰你且看萬法歸一一歸何處余問曰且道一是何物崖劈面一掌余曰不須更看歸何處崖曰且去一日崖問離卻四大五蘊清淨法身在甚麼處余豎一拳崖曰者是色身豫曰眼華作麼崖乃提起念珠云我喚作數珠你喚作什麼豫喝一喝便出因上堂豫出問世尊未出母胎如何度人已畢崖便打一棒豫擬再問崖又打豫曰不容擬議處是否崖曰不是豫曰如何即是崖又打豫一喝歸位又值上堂豫問把住時針答不入放行時七縱八橫去此二途還有施設也無崖乃拈起藕華豫便喝崖云你者一喝是賓是主豫復喝云再分明聽取崖亦喝翌日豫問如何是一喝不作一喝用崖便喝豫曰只饒棒頭領略喝下承當猶是鈍漢只如大闡提人到來作麼生抵待崖云一刀兩段後因東川呂相國有西粵之行乃邀同上七星巖中止于黔之思南閲傳燈諸録二載餘時象和尚已圓寂矣每自念曰本省善知識未參何必他往遂鳩友出涪陵復過忠路大樹堂參本師破山老和尚入門見法堂前有獅子哮吼百獸腦裂之語進方丈問獅子哮吼百獸腦裂若是獅子兒聞得又作麼生師曰同類是其同類豫喝一喝師曰切莫逐塊豫便出至夜室中延茶師問一向高隱何處豫曰黔南思唐師曰到老僧者裏可謂甚遠豫曰溪山元不隔師以手指云者一桌果子有幾種是蜀中的有幾種是楚中的看你喫那幾種豫曰喫則總喫師曰且喜不是一邊漢師受南浦請途中豫喫跌師欲重買馬不可得乃謂豫曰你若行不得不妨騎老僧馬豫曰某甲行得師曰你既行得又用拄杖子作麼豫日某甲得力處正是者條拄杖子師曰只要你行得去到南浦住太白巖未幾開縣本明法兄謀諸檀越復延過龍城紫雲寺結夏豫問護生須是殺殺盡始安居未審殺箇甚麼師曰狗走抖擻口猴愁摟搜頭豫曰殺卻者箇天下太平去也師卻曰殺箇什麼豫豎拳師曰你不會我說話在豫曰不會不會便出一日師落堂示衆云做工夫只要善用心永嘉大師云恰恰用心時恰恰無心用無心恰恰用常用恰恰無舉三此不覺從前礙膺處當下冰消瓦解便得活潑潑地豫患腹瀉師曰智者能調五臟和豫曰雞肚不知鴨肚事師曰只要你知者般事豫驟步云又要入廁去後值師上堂豫問如何是臨濟下事師便喝一喝豫亦喝一喝師曰我也喝你也喝是甚麼意旨豫曰得人一牛還人一馬師笑曰你得恁麼饒舌翌日進方丈云昨日臨濟大師到法堂上來是某甲一頓痛棒打出三門外去也師曰你昨日喝的是誰豫又喝一喝師直棒打出豫即於制內同衆圓戒畢到七月初七天童密雲師翁忌日師乃書從上源流一紙出堂付豫乃告衆曰無以報先師恩接箇香爐腳豫乃受之後隨師住鴉山栖鳳寺師命首衆一期將畢師受梁山金城寺之請本明法兄作偈送別一衆皆和豫亦和云萍蹤莫定若遊雲收取同歸一路行擔荷直須齊著力大家受用破沙盆師見頷之到金城建期補西堂位師落堂告衆云向後問話者不可頻頻到方丈起倒但問取西堂便是豫曰某甲何人敢當恁麼行事師曰老僧執事不是虛設要替老僧代勞的豫日日與衆同事勉力激勸師欲留豫相伴久住豫以病軀強辭上夜郎山懷白堂晏坐六載時素懷上座與衆檀越請於九青山東印開法厥後遂有衲子相邀出湖南豫以雙桂老和尚年尊別來已久乃出巴山過高梁特伸省覲時雙桂議補監寺有指月師白云蓮月師當為代勞師曰他正是為老僧代勞復顧衆曰老僧者數日目他語録出語亦清卻是老僧一箇放心的人次日扇頭書偈云十年鉢袋阿誰補深喜而今成禍胎時有李制臺衆護法歸渝請豫住塗山之覺林師專使送法衣來不及一載師欲下浙江掃密雲師翁塔又慮雙桂開創辛勤要人繼住乃走三書喚豫速歸令得早上天童盡多年未展之孝思從前皆豫自起倒如近來動靜皆是你諸人所共見共聞者又不待豫之瑣瑣也各請歸堂去偈上示問生禪人問取生從何處來根身器界任疑猜有時露柱驀相撞磕破頂門眼自開送劍眉禪人之曹溪雪笠雲瓢過嶺南風幡有語向誰參老盧莫信來無口常在溪頭日日談寄藥山塔主懷壁禪人笑聲猶在聽來粗笑得何人不丈夫謾道塔前空自守化龍元是躍淵魚送瞿也禪人之江南閒隨雲水走江南先遇故鄉人共談此去諸方從散淡心空那更覓禪參送靜虛禪人南遊蜀西買棹到荊南略把庭前柏子談順水張帆吳越去歸來依舊打同參和黃檗象崖和尚山居關字韻松食荷衣愛住山白雲堆裏一生閒水流華發乾坤靜人世浮名渾不關萬箇青山傍一山竹床高臥有餘閒夜來邀月供清賞分付山童莫掩關幾來水幾尋山坐笑蒲團讓我閒簾外送君何所贈數聲啼鳥過柴關住山年久並忘山物我無情一體閒猿鹿為鄰栖石室白雲幾片護松關和月平禪友詠雪劈破崑崙玉屑飛斜斜重上緑荷衣莫教出嶺風吹落留與山翁乘興歸冉逐輕風似蝶飛深山樵子易盈衣為肩榾柮供爐火佩得通身白玉歸遊人縱目興如飛華雨翩翩舞毳衣因過孤山重賞玩早梅摘得一枝歸如珠如玉亂紛飛點綴釣蓑成畫衣銀樹巖前煙火起一聲款乃趁風歸扶桑殘夜金烏飛影映山河覆白衣曙色早開知有意欲來相送玉人歸贈來蘇心空禪師雲水相邀上翠微幽巖處處雨華飛探奇欲覽東坡跡時撥煙霞待落暉與凌雲松柏禪師山房清梵幾株松山口白雲幾片封道者愛涼時散步月明靜夜淡秋容與濟川楊文學夜坐溷俗和光陋巷居聖賢晤對樂琴書夜來簾外彈山月細柳上階弄影疏初夏同沛兩王公並二三子野望山華帶露鳥啼晴幾片煙雲隴上生始信無言化育巧一天時雨澤群英柏子山與友人夜坐聽雨窗外幽閒忽有聲灑然靈籟和風清聽來倣佛欲成調半似瑤琴弄月明來蘇峰重晤折蘆道舊別來不覺十年餘瓢笠水雲無定居今日伊余鄉夢熟還將舊面晤來蘇昨夜吟詩興有餘每將奇勝話幽居文峰最是堪行樂先我來遊憶大蘇送聖可法弟還蜀八年撥轉杖頭雲一旦歸來志不群行道報恩深有望難兄難弟獨稱君示香城上座靈山佛法囑王臣持論也須是箇人言說縱然無實義當機卻喜句來親寄翠如上座相贈卒然句欲新黃牛峽裏莫藏身若從此處出頭去大地山河盡比鄰贈子英張居士竭力同開選佛場裴休無盡共行藏道名如是標千古獅子類從獅子王送天木禪人歸嶽州省親方外數年尋活佛而今一旦省慈親洞庭秋色盈天地雲水重重不隔津訪天皇誨長老持來復去餅窺人勘破行藏眼自親今日和盤重托出應教千古話頭新送別枕石法姪雙桂穿人鼻孔深人天百萬共相尋對機必也頻拈出記取當年囑展襟寄九青慧月監寺夜郎共住任高低荊楚較來略不齊雖有虛名傳七澤家風還憶舊山溪聚頭非是論高低行徑常思古德齊四海波濤風力轉誰將一滴接曹溪贈燕石法姪久侍吾師復慎終塔銘千里問王公遙追大慧前途轍才子齊稱楚蜀雄元日偶成張公喫酒李公醉佛法新年接上機今日春風初鼓動惟飄白拂對人揮寄中邑枕石法姪拄杖重撐古道場唯公才力勝諸方仰山中邑今猶在一喚猩猩面目彰送溢天上座北遊自喫我儂痛棒來相將正眼頂門開而今別去春風蚤應有拈華古法臺勘破淆訛意氣增從前疑滯火消冰咬人獅子咬人急烜赫濟宗可力興示文璞庫頭醋鹽茶米得來難不負於心衆自歡出內無私真供養楊岐標格可重觀贈香煙一如禪師明珠獨露大如山晝夜放光白滸間照破關頭天下照人人返照出塵寰延祐相傳數百秋而今三五度重修煙生白滸香無盡遞代兒孫接上流寄大慧禪師湖北湖南意滿腔今年秋色更無雙白雲影裏蘆華岸一片清風不隔江與文字牛居士夜坐藤笠飄然下楚河豈知裘馬又相過爐邊午夜語聲大秖為別來心緒多示發成崔居士選官正欲選英才格外提持選佛來但得心空便及第臥龍一起鼓風雷送我石新戒還蜀款乃一聲客思飛片帆遙逐水雲歸逢人共話春山月漫道明珠在故衣送靜虛禪人歸蜀之中巖記得能師出蜀關曾騎白象上溈山爪牙露在轉身處雄距中巖孰敢攀送無礙禪師還蜀里句拈來為送行自知未必有鄉情蜀東蜀北逢人語只要機前識得聲送三如禪師還蜀之濮巖春風有力正張帆養道直須歸濮巖石鏡分明重照面不居聖位不居凡蘄水舟中喜晴風定雲開浪不生滿船人和棹歌聲青山撥轉重重出江面愈寬卻愈平九龍山破寺雨痕三佛不同顏草樹侵階已漸刪兩度到來憐此境石屏淡墨點陳斑閲景德傳燈録馬字驢名列玉篇九逵接踵踏人天但從行處辨蹤跡鼻孔淺深盡著穿聯芳偈付雪穎發通禪人摘葉尋枝總不然惟施白棒在機前頂門著眼無他意痛癢識來千古傳付春巖性融禪人置餌垂綸立雪磯惟圖釣得金鱗歸離鉤三寸能吞吐一任風雲變化飛付溢天發海禪人踢倒淨瓶露法身重重關捩驗疏親悄然拂袖出方丈莫道逢人不為人付恆靖真祐禪人祖師心印鐵牛機直捷當陽為指揮撥轉關頭活鱍鱍雲龍風虎自生威付子鏡性住禪人喝聲互換不容遲喝出窟中獅子兒踢倒禪床更奮迅翻身大有爪牙施付繼美發英禪人俊鷹快鷂勢翀霄不罣網羅眼更高振翮摶風天地大騰騰到處有飛毛付聖傑圓玉禪人當陽提挈破沙盆正法眼開屬上根家具從今擔荷也相將遞代付兒孫付貫如道束禪人有時放去有時收七縱八橫拄杖頭佛祖安身何處是活人機下與人酬付巨著發義禪人一條白棒痛提持不放過人上上磯法令當行漫指劃頂門具眼自知歸付同野性同禪人欲成良器入爐來惡辣鉗鎚經幾回利鈍與麼頻鍛煉龍泉出匣吼風雷付允南寂圓禪人分身意在出身中全主全賓氣宇雄把定乾坤行正令雷轟電激展家風付瞿諳寂弘禪人象被雷驚犀玩月牙生華也角生紋打風何似成龍杖掌上奔騰六合雲付東巖發宗禪人夜觀乾象晝觀山兩眼大開即透關無位真人藏不住逢人直指面門間付紫橋發渡禪人痛棒無情力用全縱橫施設驗愚賢收功只在當機處據令提持佛祖權付松野發璞禪人佛祖從前一口吞而今兩眼蓋乾坤清操自有因緣至顯出滹沱法道尊付紫岫發香禪人山水鍾靈長紫芝千年瑞氣應今時雷聲喝出遞相震天下同聞吼怒猊付據一通聞禪人臨濟當年捋虎鬚還從棒下立規模玉泉今日遞相付遞代傳持續祖圖付雪幢發慧禪人角虎堆藍山裏吼山川震動吼聲長逢人露出爪牙利八面生風威自張付健若道乾禪人突然拈出即非他手疾眼親作用多覿面提持全體現喝雷棒雨起滹沱付次調克誨禪人諸方參遍玉泉來舊面相呈兩眼開棒上成龍機掣電打風打雨迅如雷付悅可道嚴禪人是法住於法位中世間出世法皆同大開佛祖人天眼靈鷲拈華正脈通
